<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buro-Diccionario IA | Proyecto ECO UHU</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --primary-purple: #6A29FF; --light-purple: #D9C5FF; --deep-purple: #4C00D1; --bg-gray: #F8F9FA; }
        body { font-family: 'DM Sans', sans-serif; background-color: var(--bg-gray); color: #1a1a1a; scroll-behavior: smooth; }
        .header-bg { background: linear-gradient(135deg, var(--deep-purple) 0%, var(--primary-purple) 100%); font-family: 'Poppins', sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(106, 41, 255, 0.1); }
        .ai-input:focus { outline: none; border-color: var(--primary-purple); box-shadow: 0 0 0 4px rgba(106, 41, 255, 0.1); }
        .term-item { cursor: pointer; transition: all 0.2s ease; padding: 1.25rem; border-bottom: 1px solid #f0f0f0; }
        .term-item:hover { background-color: #f3f0ff; transform: translateX(5px); }
        .loading-dots:after { content: '.'; animation: dots 1.5s steps(5, end) infinite; }
        @keyframes dots { 0%, 20% { content: '.'; } 40% { content: '..'; } 60% { content: '...'; } 80%, 100% { content: ''; } }
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <header class="header-bg text-white pt-12 pb-24 px-6 shadow-2xl relative overflow-hidden text-center">
        <h1 class="text-4xl md:text-6xl font-extrabold mb-4 uppercase">BURO-DICCIONARIO IA</h1>
        <p class="text-lg opacity-90 max-w-2xl mx-auto font-light italic">eduardo vizcaíno gómez • Proyecto ECO • UHU</p>
    </header>

    <main class="flex-grow max-w-5xl mx-auto px-4 -mt-16 relative z-20 pb-20">
        <section class="glass-card p-8 md:p-12 rounded-[3rem] shadow-2xl mb-12 border-t-4 border-purple-400">
            <h2 class="text-2xl font-bold text-purple-900 font-[Poppins] mb-4 text-center">Simplificador Inteligente</h2>
            <textarea id="aiInput" class="ai-input w-full p-6 bg-gray-50 border-2 border-gray-100 rounded-3xl text-lg h-32 resize-none" placeholder="Pega el texto aquí..."></textarea>
            
            <button onclick="translateWithAI()" id="btnTranslate" class="w-full mt-6 py-4 bg-purple-600 hover:bg-purple-700 text-white font-bold rounded-2xl transition-all shadow-lg flex items-center justify-center gap-2">
                <span id="btnText">Traducir a Lectura Fácil</span>
            </button>

            <div id="aiResponse" class="hidden mt-8 p-8 bg-purple-50 rounded-3xl border border-purple-100 animate-fade-in">
                <p id="aiResultText" class="text-xl text-purple-900 font-medium leading-relaxed"></p>
            </div>

            <div id="errorMessage" class="hidden mt-4 p-4 bg-red-50 text-red-700 rounded-2xl border border-red-100 text-sm text-center">
                Lo siento, Google está tardando en responder. ¡Prueba de nuevo!
            </div>
        </section>

        <section class="grid md:grid-cols-3 gap-10">
            <div class="md:col-span-1">
                <h3 class="text-xl font-bold text-purple-900 px-4 mb-4">Glosario</h3>
                <div id="termsList" class="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden"></div>
            </div>
            <div class="md:col-span-2">
                <div id="meaningDisplay" class="bg-white p-12 rounded-[3rem] shadow-sm border border-gray-100 h-full flex flex-col items-center justify-center text-center">
                    <div id="emptyState"><h4 class="text-xl font-bold text-gray-300 italic">Haz clic en un término</h4></div>
                    <div id="contentState" class="hidden text-left w-full">
                        <h4 id="displayTerm" class="text-4xl font-extrabold text-purple-900 mb-4 font-[Poppins]"></h4>
                        <p id="displayMeaning" class="text-2xl text-gray-700 leading-relaxed"></p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        const apiKey = "AIzaSyACSLJqsbDSRZSVKtXOD1klsc9mNALlp3E"; 
        const urlIA = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;

        const dictionaryData = [
            { term: "Apercibir", easy: "Es un aviso serio para que hagas algo." },
            { term: "Diligencia", easy: "Es un trámite o papeleo oficial." },
            { term: "Desestimar", easy: "Es decir que no a una petición." },
            { term: "Subsanar", easy: "Arreglar un error en un papel." }
        ];

        const listContainer = document.getElementById('termsList');
        dictionaryData.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'term-item';
            div.innerHTML = `<span class="font-bold text-gray-700">${item.term}</span>`;
            div.onclick = () => {
                document.getElementById('emptyState').classList.add('hidden');
                document.getElementById('contentState').classList.remove('hidden');
                document.getElementById('displayTerm').innerText = item.term;
                document.getElementById('displayMeaning').innerText = item.easy;
            };
            listContainer.appendChild(div);
        });

        async function translateWithAI() {
            const input = document.getElementById('aiInput').value.trim();
            if (!input) return;

            const btn = document.getElementById('btnTranslate');
            const btnText = document.getElementById('btnText');
            const responseBox = document.getElementById('aiResponse');
            const resultText = document.getElementById('aiResultText');
            const errorBox = document.getElementById('errorMessage');

            errorBox.classList.add('hidden');
            responseBox.classList.add('hidden');
            btn.disabled = true;
            btnText.innerHTML = `<span class="loading-dots">Simplificando</span>`;

            try {
                const response = await fetch(urlIA, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "Simplifica a lectura fácil: " + input }] }]
                    })
                });

                const data = await response.json();
                
                if (data.candidates && data.candidates[0].content) {
                    resultText.innerText = data.candidates[0].content.parts[0].text;
                    responseBox.classList.remove('hidden');
                } else {
                    throw new Error("Sin respuesta");
                }

            } catch (err) {
                console.error(err);
                errorBox.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btnText.innerText = "Traducir a Lectura Fácil";
            }
        }
    </script>
</body>
</html>
